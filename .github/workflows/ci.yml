name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Smoke build (host platform only)
        run: bun scripts/build.ts host

      - name: Verify binary runs
        run: |
          set -euo pipefail
          bin="dist/voxrouter-linux-x64"
          test -x "$bin"
          out="$($bin --version)"
          test "$out" = "$(jq -r .version package.json)"
          echo "✓ binary --version reports $out"
